# fbrain sensitivity tiers.
#
# rank: higher means more sensitive.
# enforce_unclassified_paths=false keeps legacy repositories usable while they
# are being migrated into shareable/internal/vault.

enforce_unclassified_paths: true
allowed_unclassified_paths:
  - .gitattributes
  - .gitignore
  - .gitleaks.toml
  - .icontext-installed
  - .icontext-tiers.yml
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - .github/
  - .icontext/

tiers:
  shareable:
    rank: 0
    paths:
      - shareable/
  internal:
    rank: 1
    paths:
      - internal/
  vault:
    rank: 2
    paths:
      - vault/
