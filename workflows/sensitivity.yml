name: icontext sensitivity

on:
  push:
  pull_request:

jobs:
  sensitivity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.30.0
      - name: Run gitleaks current-tree scan
        run: |
          "$(go env GOPATH)/bin/gitleaks" dir "$GITHUB_WORKSPACE" \
            --config "$GITHUB_WORKSPACE/.gitleaks.toml" \
            --redact \
            --no-banner
      - name: Run sensitivity tier check
        run: |
          PYTHONDONTWRITEBYTECODE=1 python3 "$GITHUB_WORKSPACE/.icontext/scripts/check_tiers.py" --repo "$GITHUB_WORKSPACE" --all
