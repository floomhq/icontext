name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Run unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.0
      - name: Run secret scan
        run: |
          "$(go env GOPATH)/bin/gitleaks" detect \
            --config config/gitleaks.toml \
            --redact \
            --no-banner
